name: ai-attestation

on:
  workflow_call:
    inputs:
      artifact_name:
        type: string
        default: ai-attestation
      retention_days:
        type: number
        default: 90
      ai_provider:
        type: string
        default: unknown
      ai_model:
        type: string
        default: unknown
      prompt_hash:
        type: string
        default: unknown

permissions:
  contents: read
  id-token: write   # required for keyless signing

jobs:
  attest:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Install cosign
      - name: Install cosign
        uses: sigstore/cosign-installer@v4

      - name: Collect metadata + write attestation
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          SHA="$(git rev-parse HEAD)"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

          mkdir -p .attest
          TS="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          cat > ".attest/${SHA}.json" <<EOF
          {
            "attestation_version": "1.0",
            "commit_sha": "${SHA}",
            "timestamp_utc": "${TS}",
            "repo": "${GITHUB_REPOSITORY}",
            "ref": "${GITHUB_REF}",
            "run_id": "${GITHUB_RUN_ID}",
            "ai_generation": {
              "provider": "${{ inputs.ai_provider }}",
              "model": "${{ inputs.ai_model }}",
              "prompt_hash": "${{ inputs.prompt_hash }}",
              "ci": {
                "workflow": "${GITHUB_WORKFLOW}",
                "job": "${GITHUB_JOB}"
              }
            }
          }
          EOF

      - name: Sign attestation (keyless)
        shell: bash
        run: |
          set -euo pipefail
          SHA="${{ steps.meta.outputs.sha }}"
          cosign sign-blob --yes \
            --output-signature ".attest/${SHA}.sig" \
            --output-certificate ".attest/${SHA}.crt" \
            ".attest/${SHA}.json"

      - name: Upload attestation artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}-${{ steps.meta.outputs.sha }}
          path: .attest/
          retention-days: ${{ inputs.retention_days }}

  verify:
    runs-on: ubuntu-latest
    needs: attest
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v4

      - name: Download attestation artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}-${{ needs.attest.outputs.sha }}
          path: .attest

      - name: Verify signature
        shell: bash
        run: |
          set -euo pipefail
          SHA="${{ needs.attest.outputs.sha }}"
          test -f ".attest/${SHA}.json"
          test -f ".attest/${SHA}.sig"
          test -f ".attest/${SHA}.crt"

          cosign verify-blob \
            --certificate ".attest/${SHA}.crt" \
            --signature ".attest/${SHA}.sig" \
            ".attest/${SHA}.json"
